<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️‍♂️ Binary Secret 💾</title>

<link rel="icon" href="favicon.ico">

<style>
body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background: black;
  color: #00ff00;
  text-align: center;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.logo {
  width: 90px;
  margin-top: 20px;
}

h1 {
  text-shadow: 0 0 15px #00ff00;
}

textarea {
  width: 90%;
  max-width: 600px;
  height: 120px;
  margin-top: 20px;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  padding: 15px;
  font-size: 16px;
}

button {
  margin: 10px;
  padding: 12px 20px;
  background: black;
  border: 1px solid #00ff00;
  color: #00ff00;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}

button:hover {
  background: #00ff00;
  color: black;
}

#result {
  margin-top: 20px;
  padding: 15px;
  min-height: 60px;
  font-size: 15px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<img src="favicon.ico" class="logo">

<h1>🕶️ Binary Secret 💾</h1>

<textarea id="message" placeholder="💬 Tape ton message secret ici..."></textarea>

<div>
<button onclick="coder()">💌 Coder</button>
<button onclick="decoder()">🔓 Décoder</button>
<button onclick="ouvrirMessages()">📩 Ouvrir dans Messages</button>
</div>

<div id="result">🟢 En attente d’un message...</div>

<script>

// 💾 Fonction coder
function coder() {
    const text = document.getElementById('message').value;
    let binary = '';
    for (let char of text) {
        binary += char.charCodeAt(0).toString(2).padStart(8,'0') + ' ';
    }
    document.getElementById('result').innerText = "🧠 Code généré :\n" + binary.trim();
}

// 🔓 Fonction decoder
function decoder() {
    const binaryText = document.getElementById('message').value.trim();
    const binaries = binaryText.match(/\b[01]{8}\b/g) || [];
    let text = '';
    for (let bin of binaries) {
        text += String.fromCharCode(parseInt(bin,2));
    }
    document.getElementById('result').innerText = "📖 Message décodé :\n" + text;
}

// 📩 Ouvrir SMS
function ouvrirMessages() {
    const content = document.getElementById('result').innerText.trim();
    if (!content.includes("0") && !content.includes("1")) {
        alert("⚠️ Aucun code binaire détecté !");
        return;
    }

    const onlyBinary = content.replace(/[^01\s]/g, '');
    const message = "😈 Essaye de décoder ça :\n" + onlyBinary;

    window.location.href = "sms:?body=" + encodeURIComponent(message);
}

// 🎬 Animation Matrix
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 35);

</script>

</body>
</html>
